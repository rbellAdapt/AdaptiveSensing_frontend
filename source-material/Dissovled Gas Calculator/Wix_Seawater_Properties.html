<!DOCTYPE html>
<html>
<head>
     <title>Seawater Properties and Saturated Atmospheric Gases</title>
    <style>

        h1 {
            text-align: center;
        }
        h2 {
            text-align: center;
        }

        .table-container {
            display: flex;
            flex-direction: row;

        }

        .table-container > div {
            margin-right: 10px; /* Add some spacing between tables */
        }
        #inputs input[type="number"] {
            width: 60px;
            border: none;
        }
        #inputs td {
           /* width: 50px;*/
        }

        table {
            border-collapse: collapse;
            font-size: 14px; /* Set table font size to Xpx */


            /* width: 600px; Increased width for 3 columns */
        }

        th, td {
            border: 1px solid black;
            padding: 4px;
            text-align: left;
            line-height: 1.1;

        }

        th {
            background-color: #f2f2f2;
        }

        /* Column widths */
        .name1-col {
            width: 150px; /* Adjust as needed */
        }
        .name2-col {
            width: 100px; /* Adjust as needed */
        }

        .value-col {
            width: 75px; /* 75, Adjust as needed */
        }

        .units-col {
            width: 100px; /* Adjust as needed */
        }
        button {
            padding-top: 2px;
            padding-bottom: 2px;
        }
        /*.button-container {*/
        /*    text-align: center; !* Center the content horizontally *!*/
        /*}*/

        .empty-container {
            height: 20px; /* Adjust the height as needed */
        }

        /* Map container styling */
        #map-container {
            width: 237px;
            height: 200px;
            margin-top: 10px; /* Add some space between the table and the map */
        }
        #map-note {
            font-size: x-small;
            text-align: left;
            margin-top: 5px; /* Adds a little space between the map and the text */
            width: 237px; /* Limit the width of the note */
            margin-left: auto;
            margin-right: auto;
        }

    </style>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
          integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
          crossorigin=""/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
            integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
            crossorigin=""></script>


</head>
<body onload="calculateSeawaterProperties()">

    <h1>Seawater Properties and Dissolved Gas Calculator</h1>
    <div class="table-container">
        <div>
            <h2>Inputs</h2>
            <table id="inputs">
                <tr>
                    <td><label for="temp">In Situ Temperature (°C)</label></td>
                    <td><input type="number" id="temp" value="10" onchange="calculateSeawaterProperties()"></td>
                </tr>
                <tr>
                    <td><label for="sal">Salinity (PSS-78)</label></td>
                    <td><input type="number" id="sal" value="35" onchange="calculateSeawaterProperties()"></td>
                </tr>
                <tr>
                    <td><label for="press">Hydrostatic Pressure (dbar)</label></td>
                    <td><input type="number" id="press" value="0" onchange="calculateSeawaterProperties()"></td>
                </tr>
                <tr>
                    <td><label for="latitude">Latitude (DD)*</label></td>
                    <td><input type="number" id="latitude" value="33.00" onchange="calculateSeawaterProperties()"></td>
                </tr>
                <tr>
                    <td><label for="longitude">Longitude (DD)*</label></td>
                    <td><input type="number" id="longitude" value="162.50" onchange="calculateSeawaterProperties()"></td>
                </tr>
            </table>

            <div id="map-container"></div>
<!--            <div id="map-note">*Latitude contributes to a gravitational term that affects pressure and depth.<br> *Latitude and longitude contribute to a compositional term that affects Absolute Salinity</div>-->
                <div id="map-note">* Latitude contributes to a small gravitational term that affects depth conversions.<br> * Latitude and longitude contribute to a very small compositional term that affects Absolute Salinity</a>
</div>


            <div class="empty-container"></div>

<!--            <div class="button-container">-->
<!--                <button onclick="calculateSeawaterProperties()">Calculate</button>-->
<!--            </div>-->
        </div>

        <div>
            <h2>Seawater Properties</h2>
            <table id="resultsTable1">
            </table>
        </div>

        <div>
            <h2>Atm. Saturated Dissolved Gas</h2>
            <table id="resultsTable2">
            </table>
        </div>
    </div>



    <script>
        function calculateSeawaterProperties() {
            const temp = parseFloat(document.getElementById("temp").value);
            const sal = parseFloat(document.getElementById("sal").value);
            const press = parseFloat(document.getElementById("press").value);
            const latitude = parseFloat(document.getElementById("latitude").value);
            const longitude = parseFloat(document.getElementById("longitude").value);

            // Update map marker position
            if (map && marker) {
                marker.setLatLng([latitude, longitude]);
                map.panTo([latitude, longitude]); // Optionally pan the map to the new marker position
            }


            const postData = {
                temp: temp,
                sal: sal,
                press: press,
                latitude: latitude,
                longitude:longitude
            };


            let apiUrl;
            //apiUrl = 'http://127.0.0.1:5000/bca-seawater';
            apiUrl = 'https://ryanbell4.pythonanywhere.com/bca-seawater';

            fetch(apiUrl, {
                method: 'POST',
                mode: 'cors', // Set the mode here, cors
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(postData)
            })
            .then(response => response.json())
            .then(data => {
                // document.getElementById("responseBox").value = JSON.stringify(data, null, 2);

                // Create the first table
                const table1 = document.getElementById("resultsTable1");
                table1.innerHTML = ""; // Clear previous results

                // Create table 1 header
                let headerRow1 = table1.insertRow();
                let nameHeader1 = document.createElement('th');
                nameHeader1.textContent = 'Parameter';
                nameHeader1.classList.add('name-col'); // Add class for width
                headerRow1.appendChild(nameHeader1);

                let valueHeader1 = document.createElement('th');
                valueHeader1.textContent = 'Value';
                valueHeader1.classList.add('value-col'); // Add class for width
                headerRow1.appendChild(valueHeader1);

                let unitsHeader1 = document.createElement('th');
                unitsHeader1.textContent = 'Units';
                unitsHeader1.classList.add('units-col'); // Add class for width
                headerRow1.appendChild(unitsHeader1);

                const orderedKeys1 = [
                    'IS_Temp_C',
                    'Pot_T_ITS90',
                    'Cons_T_ITS90',
                    'Prac_Sal_psu',
                    'Abs_Sal_g_kg',
                    'IS_Density',
                    'Chlorinity_g_kg',
                    'Ionic_strength_mol_kg_sw',
                    'Press_dbar',
                    'Depth_m',
                    'VelofSound_m_s',
                    'HeatCap_J_gK',
                    'VP_atm'
                ];

                for (const key of orderedKeys1) {
                    let row = table1.insertRow();

                    let nameCell = row.insertCell();
                    nameCell.textContent = data[key]['nice name'];
                    nameCell.classList.add('name1-col'); // Add class for width

                    let valueCell = row.insertCell();
                    valueCell.textContent = data[key]['value'];
                    valueCell.classList.add('value-col'); // Add class for width

                    let unitsCell = row.insertCell();
                    unitsCell.textContent = data[key]['units'];
                    unitsCell.classList.add('units-col'); // Add class for width
                }

                // Create the second table
                const table2 = document.getElementById("resultsTable2");
                table2.innerHTML = ""; // Clear previous results

                // Create table 2 header
                let headerRow2 = table2.insertRow();
                let nameHeader2 = document.createElement('th');
                nameHeader2.textContent = 'Parameter';

                headerRow2.appendChild(nameHeader2);

                let valueHeader2 = document.createElement('th');
                valueHeader2.textContent = 'Value';

                headerRow2.appendChild(valueHeader2);

                let unitsHeader2 = document.createElement('th');
                unitsHeader2.textContent = 'Units';

                headerRow2.appendChild(unitsHeader2);

                const orderedKeys2 = [
                    'N2sat_umol_kgsw',
                    'O2sat_umol_kgsw',
                    'Arsat_umol_kgsw',
                    'CO2sat_umol_kgsw',
                    'Nesat_umol_kgsw',
                    'Hesat_umol_kgsw',
                    'CH4sat_umol_kgsw',
                    'Krsat_umol_kgsw',
                    'H2sat_umol_kgsw',
                    'COsat_umol_kgsw',
                    'Xesat_umol_kgsw'
                ];

                for (const key of orderedKeys2) {
                    let row = table2.insertRow();

                    let nameCell = row.insertCell();
                    nameCell.textContent = data[key]['nice name'];
                    nameCell.classList.add('name2-col'); // Add class for width

                    let valueCell = row.insertCell();
                    valueCell.textContent = data[key]['value'];
                    valueCell.classList.add('value-col'); // Add class for width

                    let unitsCell = row.insertCell();
                    unitsCell.textContent = data[key]['units'];
                    unitsCell.classList.add('units-col'); // Add class for width

                }
            })
             .catch(error => {
                // document.getElementById("responseBox").value = "Error: " + error;
             });
        }



    // Initialize the map after the page loads
    document.addEventListener('DOMContentLoaded', function () {
        // Initial map setup
        map = L.map('map-container').setView([33.00, 162.50], 2); // Centered at lat lonith zoom level 2

        L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
            maxZoom: 19,
            attribution: 'Source: Esri et al '
        }).addTo(map);

        marker = L.marker([33.00, 162.50]).addTo(map); // Marker at lat lon
                map.on('click', function (e) {
            // Get the latitude and longitude of the click event
            const latitude = e.latlng.lat;
            let longitude = e.latlng.lng;

            // Wrap longitude to be between -180 and +180
            longitude = (longitude + 180) % 360 - 180;


            // Update the marker position
            marker.setLatLng([latitude, longitude]);

            // Update the input boxes with the new latitude and longitude
            document.getElementById("latitude").value = latitude.toFixed(2);
            document.getElementById("longitude").value = longitude.toFixed(2);

            calculateSeawaterProperties(); // Initial calculation and marker placement
        });


        calculateSeawaterProperties(); // Initial calculation and marker placement
    });


    </script>
</body>
</html>
